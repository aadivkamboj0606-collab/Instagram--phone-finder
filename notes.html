<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Create Note Section */
        .create-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            height: fit-content;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .create-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: #333;
        }

        .btn-create {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-create:active {
            transform: translateY(0);
        }

        /* Notes Display Section */
        .notes-section {
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .note-card {
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: noteAppear 0.3s ease-out;
        }

        @keyframes noteAppear {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .note-card.yellow {
            background: #ffd93d;
        }

        .note-card.pink {
            background: #ff6b9d;
            color: white;
        }

        .note-card.blue {
            background: #6bcfff;
            color: white;
        }

        .note-card.green {
            background: #6fdd9e;
        }

        .note-card.purple {
            background: #c586ff;
            color: white;
        }

        .note-card.orange {
            background: #ffb84d;
        }

        .note-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .note-content {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            word-wrap: break-word;
            max-height: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-date {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .note-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 0, 0, 0.1);
            color: inherit;
        }

        .btn-small:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

        .btn-delete {
            background: rgba(255, 0, 0, 0.2);
        }

        .btn-edit {
            background: rgba(0, 0, 0, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            color: #999;
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Search Section */
        .search-section {
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid white;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 14px;
            margin-top: 40px;
        }

        .back-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            opacity: 0.8;
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 32px;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Projects</a>

        <div class="header">
            <h1>📝 My Notes App</h1>
            <p class="subtitle">Create, save, and organize your notes</p>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="🔍 Search your notes..."
            >
        </div>

        <div class="main-content">
            <!-- Create Note Section -->
            <div class="create-section">
                <h2>✨ Create Note</h2>

                <div class="form-group">
                    <label for="noteTitle">Title</label>
                    <input 
                        type="text" 
                        id="noteTitle" 
                        placeholder="Enter note title..."
                        maxlength="50"
                    >
                </div>

                <div class="form-group">
                    <label for="noteContent">Content</label>
                    <textarea 
                        id="noteContent" 
                        placeholder="Write your note here..."
                        maxlength="500"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker">
                        <div class="color-option yellow selected" data-color="yellow"></div>
                        <div class="color-option pink" data-color="pink"></div>
                        <div class="color-option blue" data-color="blue"></div>
                        <div class="color-option green" data-color="green"></div>
                        <div class="color-option purple" data-color="purple"></div>
                        <div class="color-option orange" data-color="orange"></div>
                    </div>
                </div>

                <button class="btn-create" onclick="createNote()">➕ Create Note</button>
            </div>

            <!-- Notes Display Section -->
            <div class="notes-section">
                <div id="notesContainer" class="notes-grid"></div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>✏️ Edit Note</h2>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>

                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input 
                        type="text" 
                        id="editTitle" 
                        placeholder="Enter note title..."
                        maxlength="50"
                    >
                </div>

                <div class="form-group">
                    <label for="editContent">Content</label>
                    <textarea 
                        id="editContent" 
                        placeholder="Write your note here..."
                        maxlength="500"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker" id="editColorPicker">
                        <div class="color-option yellow" data-color="yellow"></div>
                        <div class="color-option pink" data-color="pink"></div>
                        <div class="color-option blue" data-color="blue"></div>
                        <div class="color-option green" data-color="green"></div>
                        <div class="color-option purple" data-color="purple"></div>
                        <div class="color-option orange" data-color="orange"></div>
                    </div>
                </div>

                <button class="btn-create" onclick="saveEdit()">💾 Save Changes</button>
            </div>
        </div>

        <div class="footer">
            <p>💻 Built with HTML, CSS & JavaScript | All notes saved locally</p>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let currentColor = 'yellow';
        let editingNoteId = null;

        // Color picker
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(el => {
                    el.classList.remove('selected');
                });
                this.classList.add('selected');
                currentColor = this.dataset.color;
            });
        });

        // Edit color picker
        document.querySelectorAll('#editColorPicker .color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('#editColorPicker .color-option').forEach(el => {
                    el.classList.remove('selected');
                });
                this.classList.add('selected');
            });
        });

        function createNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();

            if (!title || !content) {
                alert('Please fill in both title and content!');
                return;
            }

            const note = {
                id: Date.now(),
                title: title,
                content: content,
                color: currentColor,
                date: new Date().toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                })
            };

            notes.unshift(note);
            saveNotes();
            renderNotes();

            // Clear form
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            currentColor = 'yellow';
            document.querySelectorAll('.color-option').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelector('.color-option.yellow').classList.add('selected');
        }

        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                saveNotes();
                renderNotes();
            }
        }

        function openEditModal(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            editingNoteId = id;
            document.getElementById('editTitle').value = note.title;
            document.getElementById('editContent').value = note.content;

            document.querySelectorAll('#editColorPicker .color-option').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelector(`#editColorPicker .color-option[data-color="${note.color}"]`).classList.add('selected');

            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            editingNoteId = null;
        }

        function saveEdit() {
            if (!editingNoteId) return;

            const title = document.getElementById('editTitle').value.trim();
            const content = document.getElementById('editContent').value.trim();
            const color = document.querySelector('#editColorPicker .color-option.selected').dataset.color;

            if (!title || !content) {
                alert('Please fill in both title and content!');
                return;
            }

            const note = notes.find(n => n.id === editingNoteId);
            if (note) {
                note.title = title;
                note.content = content;
                note.color = color;
                saveNotes();
                renderNotes();
                closeModal();
            }
        }

        function searchNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredNotes = notes.filter(note => 
                note.title.toLowerCase().includes(searchTerm) || 
                note.content.toLowerCase().includes(searchTerm)
            );
            renderNotes(filteredNotes);
        }

        function renderNotes(notesToRender = notes) {
            const container = document.getElementById('notesContainer');
            
            if (notesToRender.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📭 No notes yet</p><p>Create your first note to get started!</p></div>';
                return;
            }

            container.innerHTML = notesToRender.map(note => `
                <div class="note-card ${note.color}">
                    <div class="note-title">${escapeHtml(note.title)}</div>
                    <div class="note-date">${note.date}</div>
                    <div class="note-content">${escapeHtml(note.content)}</div>
                    <div class="note-actions">
                        <button class="btn-small btn-edit" onclick="openEditModal(${note.id})">✏️ Edit</button>
                        <button class="btn-small btn-delete" onclick="deleteNote(${note.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function saveNotes() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', searchNotes);

        // Initial render
        renderNotes();

        // Enter key to create note
        document.getElementById('noteTitle').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('noteContent').focus();
        });

        document.getElementById('noteContent').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) createNote();
        });

        // Close modal on outside click
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
