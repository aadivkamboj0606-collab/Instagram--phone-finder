<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>✅ My To-Do List</h1>
                <p class="subtitle">Manage your tasks efficiently</p>
            </div>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..."
                    class="todo-input"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span>Total: <strong id="totalCount">0</strong></span>
                <span>Active: <strong id="activeCount">0</strong></span>
                <span>Completed: <strong id="completedCount">0</strong></span>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div id="emptyState" class="empty-state">
                <p>🎯 No tasks yet! Add one to get started.</p>
            </div>

            <div class="actions">
                <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
                <button id="deleteAllBtn" class="delete-all-btn">Delete All</button>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
